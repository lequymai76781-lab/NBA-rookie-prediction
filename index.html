<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA新秀生涯潜力预测系统 • Supabase风格</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500&display=swap');

        :root {
            --supabase-green: #3ecf8e;
            --supabase-link-green: #00c573;
        }

        * {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .display-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .hero-text {
            font-size: 72px;
            line-height: 1.00;
            letter-spacing: -2px;
        }

        body {
            background: #171717;
            color: #fafafa;
        }

        .nav-bg {
            background: #171717;
            border-bottom: 1px solid #2e2e2e;
        }

        .card {
            background: #171717;
            border: 1px solid #2e2e2e;
            border-radius: 16px;
        }

        .pill-primary {
            background: #0f0f0f;
            border: 1px solid #fafafa;
            border-radius: 9999px;
            padding: 8px 32px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pill-primary:hover {
            background: #3ecf8e;
            border-color: #3ecf8e;
            color: #0f0f0f;
        }

        .glass {
            background: rgba(41, 41, 41, 0.84);
            backdrop-filter: blur(12px);
        }

        .section-header {
            font-size: 36px;
            line-height: 1.25;
        }

        .loading {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Navbar -->
    <nav class="nav-bg sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-[#3ecf8e] rounded-2xl flex items-center justify-center text-[#0f0f0f] text-2xl font-bold">🏀</div>
                <div>
                    <span class="text-2xl font-semibold tracking-[-0.5px]">NBA新秀</span>
                    <span class="text-[#3ecf8e] text-2xl font-semibold tracking-[-0.5px]">潜力预测</span>
                </div>
            </div>

            <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
                <a href="#" onclick="navigateToSection('hero')" class="hover:text-[#3ecf8e]">首页</a>
                <a href="#" onclick="navigateToSection('predict')" class="hover:text-[#3ecf8e]">开始预测</a>
                <a href="#" onclick="navigateToSection('similar')" class="hover:text-[#3ecf8e]">历史模板</a>
                <a href="#" onclick="navigateToSection('metrics')" class="hover:text-[#3ecf8e]">硬核指标</a>
            </div>

            <div onclick="startNewPrediction()" class="pill-primary cursor-pointer text-sm font-medium flex items-center gap-x-2">
                <span>立即预测新秀</span>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section id="hero" class="max-w-screen-2xl mx-auto px-8 pt-16 pb-20">
        <div class="text-center max-w-4xl mx-auto">
            <div class="inline-flex items-center gap-x-2 bg-[#2e2e2e] text-[#3ecf8e] text-sm font-medium px-4 h-8 rounded-3xl mb-6">
                <div class="w-2 h-2 bg-[#3ecf8e] rounded-full animate-pulse"></div>
                基于 XGBoost + 历史老将数据
            </div>

            <h1 class="hero-text display-font text-[#fafafa] mb-4">
                新秀生涯<br>潜力预测系统
            </h1>

            <p class="text-[#b4b4b4] text-2xl max-w-xl mx-auto leading-tight mb-12">
                复刻 Supabase 极致暗黑美学<br>
                精准预测每一位新秀的10年巅峰路径
            </p>

            <!-- 搜索栏 -->
            <div class="max-w-2xl mx-auto">
                <div class="glass border border-[#2e2e2e] rounded-3xl px-6 py-5 flex items-center gap-x-4 cursor-text hover:border-[#3ecf8e]/30 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-[#3ecf8e]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 01-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input id="searchInput" type="text" placeholder="搜索新秀… 文班亚马 / victor / 班切罗"
                           class="flex-1 bg-transparent outline-none text-lg placeholder-[#898989]"
                           onkeyup="if(event.key==='Enter') handleSearch()">
                    <div onclick="handleSearch()" class="pill-primary text-sm font-medium px-8 py-2 cursor-pointer">
                        搜索
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 主预测面板 -->
    <section id="predict" class="max-w-screen-2xl mx-auto px-8 pb-20">
        <div class="flex items-center justify-between mb-8">
            <h2 class="section-header display-font">🎯 核心预测结果</h2>
            <select id="playerSelect" onchange="loadPlayerData()"
                    class="bg-[#171717] border border-[#2e2e2e] rounded-3xl px-6 py-2 text-sm focus:outline-none focus:border-[#3ecf8e]">
            </select>
        </div>

        <div id="loading" class="hidden text-center py-20 text-[#3ecf8e]">
            <div class="loading inline-block">正在从后端加载预测结果...</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- 左侧预测卡片 -->
            <div class="lg:col-span-5 space-y-6">
                <div id="typeCard" class="card p-8 text-center">
                    <div class="text-[#3ecf8e] text-sm tracking-widest mb-2">🏷️ 预测生涯类型</div>
                    <div id="predType" class="text-5xl font-bold mb-4"></div>
                    <div id="confidence" class="text-2xl text-[#b4b4b4]"></div>
                    <div id="typeDesc" class="mt-6 text-[#b4b4b4]"></div>
                    <div id="customNote" class="text-xs mt-8 bg-[#2e2e2e] rounded-2xl px-5 py-3 text-[#898989]"></div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div id="subTypeCard" class="card p-6 text-center">
                        <div class="text-xs text-[#b4b4b4]">📌 二级分类</div>
                        <div id="subType" class="text-4xl font-bold mt-2"></div>
                    </div>
                    <div class="card p-6 text-center">
                        <div class="text-xs text-[#b4b4b4]">🏅 生涯潜力评分</div>
                        <div id="potentialScore" class="text-7xl font-bold text-[#3ecf8e]"></div>
                    </div>
                </div>

                <div class="card p-6">
                    <span class="text-xs text-[#898989]">💡 当前技术定位</span>
                    <div id="playerPosition" class="text-2xl font-medium mt-1"></div>
                </div>
            </div>

            <!-- 右侧相似球员 -->
            <div id="similarPanel" class="lg:col-span-7 card p-8">
                <h3 class="text-lg font-medium mb-6">历史相似老将参考</h3>
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-[#898989]">
                            <th class="text-left py-3">球员</th>
                            <th class="text-left py-3">生涯类型</th>
                            <th class="text-right py-3">新秀得分</th>
                            <th class="text-right py-3">生涯长度</th>
                        </tr>
                    </thead>
                    <tbody id="similarBody"></tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- 硬核指标、雷达图、趋势图、报告等部分保持不变（为了简洁这里省略了重复代码） -->
    <!-- 你可以保留你原来的 metrics、radar、trend、compareTable、reportText 部分 -->

    <script>
        const API_BASE = '';  // 相对路径（推荐同域部署）
        // 如果后端和前端不在同一域名，改成：const API_BASE = 'https://你的后端地址';

        let currentRookies = [];
        let currentPlayer = null;
        let radarChart = null;
        let trendChart = null;

        async function fetchRookies() {
            try {
                const res = await fetch(`${API_BASE}/api/rookies`);
                currentRookies = await res.json();
                populatePlayerSelect();
            } catch (e) {
                console.error("获取新秀列表失败", e);
                alert("无法连接后端，请检查 FastAPI 是否启动");
            }
        }

        function populatePlayerSelect() {
            const select = document.getElementById('playerSelect');
            select.innerHTML = '';
            currentRookies.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.player_name;
                opt.textContent = `${p.player_name} | ${p.player_name_cn || p.player_name}`;
                select.appendChild(opt);
            });
        }

        async function loadPlayerData() {
            const name = document.getElementById('playerSelect').value;
            if (!name) return;

            document.getElementById('loading').classList.remove('hidden');

            try {
                const res = await fetch(`${API_BASE}/api/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ player_name: name })
                });

                if (!res.ok) throw new Error('球员不存在');

                const data = await res.json();
                currentPlayer = data;

                // 渲染所有卡片
                renderPredictionCards(data);
                renderSimilarPlayers(data.similar_players);
                renderMetrics(data);
                renderRadarChart(data);
                renderTrendChart(data);
                renderReport(data);

            } catch (err) {
                console.error(err);
                alert("预测失败：" + err.message);
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function renderPredictionCards(data) {
            document.getElementById('predType').innerHTML = `<span class="text-[#3ecf8e]">${data.pred_type}</span>`;
            document.getElementById('confidence').innerHTML = `置信度: <strong>${(data.confidence * 100).toFixed(1)}%</strong>`;
            document.getElementById('typeDesc').textContent = data.career_length < 3 ? "历史级天赋，潜力待定" : "巅峰持续10年以上";
            document.getElementById('customNote').innerHTML = data.player_name.toLowerCase().includes('wembanyama')
                ? '注：超巨新秀，相似球员100%为超长巅峰型' : '注：基于高阶特征与身体素质综合判定';

            document.getElementById('subType').textContent = data.sub_type;
            document.getElementById('potentialScore').textContent = data.potential_score;
            document.getElementById('playerPosition').innerHTML = `<span class="text-[#00c573]">${data.player_position}</span>`;
        }

        function renderSimilarPlayers(similar) {
            const tbody = document.getElementById('similarBody');
            tbody.innerHTML = '';
            similar.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "border-t border-[#2e2e2e] hover:bg-[#2e2e2e]";
                tr.innerHTML = `
                    <td class="py-4">${item.name}</td>
                    <td class="py-4 text-[#3ecf8e]">${item.type}</td>
                    <td class="py-4 text-right">${item.score}</td>
                    <td class="py-4 text-right">${item.career_length}年</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderMetrics(data) {
            // 这里可以继续补充你原来的硬核指标渲染逻辑
            console.log("硬核指标数据：", data);
        }

        function renderRadarChart(data) {
            // 可根据实际数据调整，这里用示例
            const ctx = document.getElementById('radarChart');
            if (radarChart) radarChart.destroy();
            // ... Chart.js 雷达图代码（可复用你原来的）
        }

        function renderTrendChart(data) {
            // 同上
        }

        function renderReport(data) {
            // 同上，可保留你原来的 renderReport 逻辑
        }

        function handleSearch() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!keyword) return;
            // 简单前端过滤
            const filtered = currentRookies.filter(p =>
                p.player_name.toLowerCase().includes(keyword) ||
                (p.player_name_cn && p.player_name_cn.includes(keyword))
            );
            if (filtered.length > 0) {
                currentRookies = filtered;
                populatePlayerSelect();
                loadPlayerData();
            }
        }

        function navigateToSection(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        function startNewPrediction() {
            navigateToSection('predict');
        }

        // 初始化
        window.onload = async () => {
            await fetchRookies();
            if (currentRookies.length > 0) {
                document.getElementById('playerSelect').value = currentRookies[0].player_name;
                loadPlayerData();
            }
        };
    </script>
</body>
</html>
